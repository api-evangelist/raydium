specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Raydium
providerId: raydium
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Solana
  - DEX
  - Plans
description: >-
  Raydium is a decentralized protocol on Solana; the public REST API at api-v3.raydium.io is free
  and unauthenticated. There is no commercial subscription. Cost to use Raydium at scale is
  Solana priority-fee gas plus per-pool LP swap fee.
sources:
  - https://docs.raydium.io/
  - https://api-v3.raydium.io/docs/
plans:
  - id: raydium-public-api
    name: Public REST API (Free)
    type: open
    description: Free, unauthenticated REST API used by the Raydium UI and third parties.
    entries:
      - label: Subscription
        name: public_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: No authentication
      - name: Fair-use rate limit
  - id: raydium-onchain
    name: On-chain (Solana fee + pool fee)
    type: usage
    description: Smart-contract usage charges Solana priority fee gas and pool swap fee per trade.
    entries:
      - label: Pool swap fee (set per pool)
        name: swap_fee
        type: usage
        metric: trade
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: typically 0.25% AMM / variable CLMM (set per pool)
        userMultiplied: false
    elements:
      - name: Solana priority fee paid in SOL
      - name: LP receives most of swap fee
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
