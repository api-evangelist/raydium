specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Raydium
providerId: raydium
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - Solana
  - DEX
  - Rate Limiting
description: >-
  Raydium's public REST API at api-v3.raydium.io is operated on a fair-use basis without
  published per-key limits. Empirically responses are cached at the edge and consumers should
  respect a soft limit of around 10 requests per second per IP.
notes: Raydium does not publish a contractual rate limit; figures are best-effort.
sources:
  - https://api-v3.raydium.io/docs/
responseCodes:
  throttled: 429
limits:
  - name: Public REST API (fair use)
    scope: ip
    metric: requests_per_second
    limit: 10
    notes: Soft fair-use; cache responses where possible.
policies:
  - name: Caching
    description: Pool list updates on the order of every minute or two; cache aggressively.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
