description: Raydium is a leading Solana AMM and liquidity provider supporting standard
  AMM, concentrated liquidity (CLMM), and a launchpad. The Raydium API at api-v3.raydium.io
  exposes pool, farm, token, swap quote, and price endpoints used by the Raydium UI
  and integrators. Smart-contract entry points are the primary write path.
